# https://taskfile.dev

version: "3"

vars:
  REPOSITORY: ghcr.io/adrianliechti/wingman-chat

tasks:
  serve:
    env:
      PORT: "8080"
      PREFIX: "/"
      STORE_ENABLED: "true"
    cmds:
      - go run .

  ui:
    cmds:
      # task serve is the dev backend — inline so it beats a WINGMAN_URL exported
      # in the shell (Taskfile `env:` does not override OS environment variables),
      # which would bypass the local server (and its store routes) entirely.
      - WINGMAN_URL=http://localhost:8080 npm run dev

  run:
    cmds:
      - docker run -it --rm -p 8000:8000 -e WINGMAN_URL=http://host.docker.internal:8080 $(docker build -q .)

  publish:
    cmds:
      - docker buildx build . --push --platform linux/amd64,linux/arm64 --tag {{.REPOSITORY}}
